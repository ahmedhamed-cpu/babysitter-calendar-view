<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babysitter Schedule Matrix</title>
    <!-- Tailwind CSS for modern layout & cards -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: system-ui, sans-serif; }
        .timeline-grid { display: grid; grid-template-columns: 220px 1fr; }
    </style>
</head>
<body class="p-6 min-h-screen">

    <!-- ─── DASHBOARD CONTROL HEADER ────────────────────────── -->
    <header class="max-w-7xl mx-auto mb-8 flex flex-col md:flex-row md:items-center md:justify-between border-b border-slate-800 pb-6">
        <div>
            <h1 class="text-3xl font-bold tracking-tight bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">
                Babysitter Assignment Timeline
            </h1>
            <p class="text-slate-400 mt-1 text-sm">Real-time sync dashboard connected to your n8n workflow pipeline.</p>
        </div>
        <div class="mt-4 md:mt-0 flex items-center gap-3">
            <span class="flex h-3 w-3 relative">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
            </span>
            <span class="text-sm font-medium text-emerald-400 bg-emerald-950/50 px-3 py-1.5 rounded-full border border-emerald-800/50">
                Live Sync Active
            </span>
        </div>
    </header>

    <!-- ─── TIMELINE MATRIX WRAPPER ────────────────────────── -->
    <main class="max-w-7xl mx-auto">
        <div id="loading-state" class="text-center py-20 text-slate-500">
            <p class="animate-pulse text-lg">Establishing live link connection to database...</p>
        </div>

        <!-- Dynamic booking container layout -->
        <div id="matrix-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
            <!-- JavaScript dynamically injects schedule entry cards here -->
        </div>
    </main>

    <!-- ─── FIREBASE APP CORE MODULE ENGINE ─────────────────── -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        // Note: Using initializeFirestore to support your custom named database reference
        import { initializeFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase Web Configuration Credentials
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY", // Replace with your actual Firebase API Key
            authDomain: "babysitter-calendar-view.firebaseapp.com",
            projectId: "babysitter-calendar-view",
            storageBucket: "babysitter-calendar-view.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize App Configuration Instance
        const app = initializeApp(firebaseConfig);

        // Core Fix: Targets your custom-named database instance "babysittercalendarview"
        const db = initializeFirestore(app, {
            databaseId: 'babysittercalendarview'
        });

        // ─── BABY SITTER COLOR PALETTE MAP DIRECTORY ───────────────
        const nurseColors = {
            "Catherin Fernandez": "#3b82f6", "Jelly Orque": "#ec4899", "Greeshma Babu": "#a855f7",
            "Noha Abbas": "#f59e0b", "Fatma Mohamed": "#10b981", "Taysir Ali": "#0ea5e9",
            "May Joy": "#f43f5e", "Mary Cris Cansica": "#8b5cf6", "Asmaliya Dica Disoma": "#f97316",
            "Zeinab Mohamed": "#06b6d4", "Aya Mlhem": "#3b82f6", "Salma Awaad": "#ec4899",
            "Anhar Mohamed": "#a855f7", "Enas Salah": "#f59e0b", "Mahmoud Fawzy": "#10b981",
            "Rofaida Fadul": "#0ea5e9", "Vanessa Gonzales": "#f43f5e", "Rosalie L Cane": "#8b5cf6",
            "Warda Inog Zacaria": "#f97316", "Kristy Rosales": "#06b6d4", "Mary Donna Manjares Valdez": "#3b82f6",
            "Salvacion Dumaya Blam": "#ec4899", "Mahomud Amin": "#a855f7", "Aml Rabie": "#f59e0b",
            "Maurelle Acob": "#10b981", "Dhyana Breeze Catalma": "#0ea5e9", "Mylene Limgas Malan": "#f43f5e",
            "Angelita C. Valdez": "#8b5cf6", "Rechelle Tarrobago Abina": "#f97316", "Florevel Tigle Inicial": "#06b6d4",
            "Jazmen A. Daliasen": "#3b82f6", "Theresa A. Moscoso": "#ec4899", "Bai Alleha Manonsol": "#a855f7",
            "Sitti Nurisa": "#f59e0b", "Maricel Llanzana": "#10b981", "Maria Fe": "#0ea5e9",
            "Norfaisa Conel": "#f43f5e", "Aloha H Saldivar": "#8b5cf6", "Criselda Pando Peralta": "#f97316",
            "Lilibeth Nortes": "#06b6d4", "Margie": "#3b82f6", "Margie Billanon Gabaisen": "#ec4899",
            "Mona Akon Anong": "#a855f7", "Noraida Mutia Madale": "#f59e0b", "Liezel Boncasin": "#10b981",
            "Jennifer M. Royo": "#0ea5e9", "Lorena Austria Lloren": "#f43f5e", "Rosario Gajardo": "#8b5cf6",
            "Marcelyn Matayao": "#f97316", "MaryAnn Demetrio": "#06b6d4", "Veronica Fidalgo": "#3b82f6",
            "Thelma Ahamadul": "#ec4899", "Fatima Aliah Emban": "#a855f7", "Evangeline Allera Ocampo": "#f59e0b",
            "Ria Gutierez": "#10b981", "Rayjana Gubat Palman": "#0ea5e9", "Gillian": "#f43f5e",
            "Norfa": "#8b5cf6", "Almalyn": "#f97316", "Aiza": "#06b6d4", "Anabel": "#3b82f6",
            "Jean Montesilio": "#ec4899", "Varsha Lathika": "#a855f7", "Floriza Bihas Alviz": "#f59e0b",
            "Radia Ismaeal": "#10b981", "Cicily Joseph": "#0ea5e9", "Maricel Alaman": "#f43f5e",
            "Aga Kendik Mangelen": "#8b5cf6", "Unassigned": "#94a3b8"
        };

        // ─── FIRESTORE REALTIME ENGINE SYNCHRONIZER ───────────────
        const bookingsCollection = collection(db, "bookings");
        const loadingState = document.getElementById("loading-state");
        const matrixContainer = document.getElementById("matrix-container");

        onSnapshot(bookingsCollection, (snapshot) => {
            // Hide loading state once data arrives
            loadingState.classList.add("hidden");
            matrixContainer.classList.remove("hidden");
            
            // Clean DOM grid clear to prevent rendering stack layout duplication
            matrixContainer.innerHTML = "";

            if (snapshot.empty) {
                matrixContainer.innerHTML = `<p class="col-span-full text-center text-slate-500 py-10">No active bookings found in collection.</p>`;
                return;
            }

            snapshot.forEach((docRecord) => {
                const order = docRecord.data();
                
                // Fallbacks to handle data gracefully if n8n provides variant keys
                const nurseName = order.nurseName || order.Nurse || "Unassigned";
                const customer = order.customerName || order.Customer || "Unknown Customer";
                const currentStatus = order.status || order["Order Status"] || "No Status";
                const accentColor = nurseColors[nurseName] || "#94a3b8";

                // Generate UI Card element blueprint strings
                const cardHtml = `
                    <div class="bg-slate-900 border border-slate-800 rounded-xl p-5 shadow-lg relative overflow-hidden transition-all hover:border-slate-700">
                        <!-- Top Nurse Color Bar Accent Indication -->
                        <div class="absolute top-0 left-0 right-0 h-1.5" style="background-color: ${accentColor}"></div>
                        
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-lg font-bold text-slate-100">${nurseName}</h3>
                                <p class="text-xs text-slate-400 mt-0.5">Assigned Provider</p>
                            </div>
                            <span class="text-xs px-2.5 py-1 font-semibold rounded-md bg-slate-800 text-blue-400 border border-slate-700 uppercase tracking-wider">
                                ${currentStatus}
                            </span>
                        </div>

                        <div class="space-y-3 pt-2 border-t border-slate-800/60 text-sm">
                            <div class="flex justify-between">
                                <span class="text-slate-500">Client:</span>
                                <span class="font-medium text-slate-300">${customer}</span>
                            </div>
                            ${order["Prescription Status"] ? `
                            <div class="flex justify-between items-center bg-slate-950/40 p-2 rounded border border-slate-800/40 mt-1">
                                <span class="text-xs text-slate-500">Prescription:</span>
                                <span class="text-xs font-mono text-purple-400 font-medium">${order["Prescription Status"]}</span>
                            </div>` : ''}
                        </div>
                    </div>
                `;
                
                // Inject generated item node mapping into live container shell
                matrixContainer.insertAdjacentHTML("beforeend", cardHtml);
            });
        });
    </script>
</body>
</html>
