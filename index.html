<title>Babysitter Schedule — Valeo</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --valeo-gold: #F6BD22;
    --valeo-gold-dark: #E0A800;
    --valeo-navy: #1A2238;
    --valeo-cream: #FDFBF6;
    --valeo-paper: #FFFFFF;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--valeo-cream);
  }
  .grid-scroll::-webkit-scrollbar { height: 8px; }
  .grid-scroll::-webkit-scrollbar-thumb { background: #e8e1d0; border-radius: 4px; }
  .booking-block {
    position: absolute;
    top: 4px;
    bottom: 4px;
    border-radius: 8px;
    padding: 4px 8px;
    overflow: hidden;
    cursor: pointer;
    box-shadow: 0 1px 2px rgba(26,34,56,0.06);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    border: 1px solid rgba(26,34,56,0.06);
  }
  .booking-block:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 14px rgba(26,34,56,0.14);
    z-index: 20;
  }
  .nurse-row { position: relative; height: 64px; border-bottom: 1px solid #f0ebe0; }
  .time-col { min-width: 90px; }
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(26,34,56,0.55);
    display: flex; align-items: center; justify-content: center; z-index: 50;
  }
  .gold-underline {
    height: 3px;
    background: linear-gradient(90deg, var(--valeo-gold), var(--valeo-gold-dark));
  }
  .nav-btn {
    transition: all 0.15s ease;
  }
  .nav-btn:hover {
    border-color: var(--valeo-gold);
    color: var(--valeo-navy);
  }
</style>
</head>

    <p class="text-sm text-[#8a8473] mb-4" id="modal-customer-name">&mdash;</p>

    <div class="space-y-2 text-sm text-[#6b6557] mb-5">
      <div class="flex justify-between"><span>Order ID</span><span class="font-mono text-xs text-[#a39d8c]" id="modal-order-id">&mdash;</span></div>
      <div class="flex justify-between"><span>Time</span><span id="modal-time">&mdash;</span></div>
      <div class="flex justify-between"><span>Package</span><span id="modal-package">&mdash;</span></div>
    </div>

    <p class="text-xs font-semibold text-[#8a8473] uppercase tracking-wide mb-2">Update status</p>
    <div class="grid grid-cols-2 gap-2">
      <button data-status="Attended" class="modal-status-btn px-3 py-2 rounded-lg text-sm font-semibold bg-emerald-50 text-emerald-700 border border-emerald-200 hover:bg-emerald-100">&#10003; Attended</button>
      <button data-status="Absent" class="modal-status-btn px-3 py-2 rounded-lg text-sm font-semibold bg-rose-50 text-rose-700 border border-rose-200 hover:bg-rose-100">&#10005; Absent</button>
      <button data-status="Sick Leave" class="modal-status-btn px-3 py-2 rounded-lg text-sm font-semibold bg-amber-50 text-amber-700 border border-amber-200 hover:bg-amber-100">&#9888; Sick Leave</button>
      <button data-status="No Show" class="modal-status-btn px-3 py-2 rounded-lg text-sm font-semibold bg-orange-50 text-orange-700 border border-orange-200 hover:bg-orange-100">&#8856; No Show</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // Firebase web config. Safe to expose publicly because Firestore
  // Security Rules scope access to the "bookings" collection only,
  // and restrict client writes to the "status" field exclusively.
  // See firestore_rules_updated.txt for the matching rules.
  const firebaseConfig = {
    apiKey: "AIzaSyCPJijOpBBPdU_euyvgwics6F6tZROfHFU",
    authDomain: "babysitter-calendar-view.firebaseapp.com",
    projectId: "babysitter-calendar-view",
    storageBucket: "babysitter-calendar-view.firebasestorage.app",
    messagingSenderId: "398535391948",
    appId: "1:398535391948:web:e8c1d6424f2dbe62b06069"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // CONFIG
  const GRID_START_HOUR = 8;
  const GRID_END_HOUR = 22;
  const PIXELS_PER_HOUR = 90;
  const DEFAULT_DURATION_MIN = 240;

  const nurseColors = {
    "Catherin Fernandez": "#3b82f6", "Jelly Orque": "#ec4899", "Greeshma Babu": "#a855f7",
    "Noha Abbas": "#f59e0b", "Fatma Mohamed": "#10b981", "Taysir Ali": "#0ea5e9",
    "May Joy": "#f43f5e", "Mary Cris Cansica": "#8b5cf6", "Asmaliya Dica Disoma": "#f97316",
    "Zeinab Mohamed": "#06b6d4", "Aya Mlhem": "#3b82f6", "Salma Awaad": "#ec4899",
    "Anhar Mohamed": "#a855f7", "Enas Salah": "#f59e0b", "Mahmoud Fawzy": "#10b981",
    "Rofaida Fadul": "#0ea5e9", "Vanessa Gonzales": "#f43f5e", "Rosalie L Cane": "#8b5cf6",
    "Warda Inog Zacaria": "#f97316", "Kristy Rosales": "#06b6d4",
    "Mary Donna Manjares Valdez": "#3b82f6", "Salvacion Dumaya Blam": "#ec4899",
    "Mahomud Amin": "#a855f7", "Aml Rabie": "#f59e0b", "Maurelle Acob": "#10b981",
    "Dhyana Breeze Catalma": "#0ea5e9", "Mylene Limgas Malan": "#f43f5e",
    "Angelita C. Valdez": "#8b5cf6", "Rechelle Tarrobago Abina": "#f97316",
    "Florevel Tigle Inicial": "#06b6d4", "Jazmen A. Daliasen": "#3b82f6",
    "Theresa A. Moscoso": "#ec4899", "Bai Alleha Manonsol": "#a855f7",
    "Sitti Nurisa": "#f59e0b", "Maricel Llanzana": "#10b981", "Maria Fe": "#0ea5e9",
    "Norfaisa Conel": "#f43f5e", "Aloha H Saldivar": "#8b5cf6",
    "Criselda Pando Peralta": "#f97316", "Lilibeth Nortes": "#06b6d4", "Margie": "#3b82f6",
    "Margie Billanon Gabaisen": "#ec4899", "Mona Akon Anong": "#a855f7",
    "Noraida Mutia Madale": "#f59e0b", "Liezel Boncasin": "#10b981",
    "Jennifer M. Royo": "#0ea5e9", "Lorena Austria Lloren": "#f43f5e",
    "Rosario Gajardo": "#8b5cf6", "Marcelyn Matayao": "#f97316",
    "MaryAnn Demetrio": "#06b6d4", "Veronica Fidalgo": "#3b82f6",
    "Thelma Ahamadul": "#ec4899", "Fatima Aliah Emban": "#a855f7",
    "Evangeline Allera Ocampo": "#f59e0b", "Ria Gutierez": "#10b981",
    "Rayjana Gubat Palman": "#0ea5e9", "Gillian": "#f43f5e", "Norfa": "#8b5cf6",
    "Almalyn": "#f97316", "Aiza": "#06b6d4", "Anabel": "#3b82f6",
    "Jean Montesilio": "#ec4899", "Varsha Lathika": "#a855f7",
    "Floriza Bihas Alviz": "#f59e0b", "Radia Ismaeal": "#10b981",
    "Cicily Joseph": "#0ea5e9", "Maricel Alaman": "#f43f5e",
    "Aga Kendik Mangelen": "#8b5cf6", "Unassigned": "#94a3b8"
  };
  function colorFor(name) { return nurseColors[name] || "#6366f1"; }

  const statusAccent = {
    "Attended": "#10b981",
    "Absent": "#f43f5e",
    "Sick Leave": "#f59e0b",
    "No Show": "#fb923c",
    "Pending": null
  };

  let allBookings = [];
  let activeModalDocId = null;
  const datePicker = document.getElementById('date-picker');
  const todayStr = () => new Date().toISOString().slice(0, 10);
  datePicker.value = todayStr();

  function renderTimeHeader() {
    const header = document.getElementById('time-header');
    header.innerHTML = '';
    for (let h = GRID_START_HOUR; h < GRID_END_HOUR; h++) {
      const label = document.createElement('div');
      label.style.width = PIXELS_PER_HOUR + 'px';
      label.className = 'shrink-0 px-2 py-2 text-xs font-medium text-[#a39d8c] border-r border-[#f5f1e8]';
      const displayHour = h > 12 ? h - 12 : h;
      const ampm = h >= 12 ? 'PM' : 'AM';
      label.textContent = displayHour + ':00 ' + ampm;
      header.appendChild(label);
    }
  }
  renderTimeHeader();

  function parseSlotDateTime(order) {
    const dateRaw = order["Booked Slot Date"];
    const timeRaw = order["Booked Slot Time"];
    if (!dateRaw) return null;

    let dateObj;
    if (dateRaw.toDate) {
      dateObj = dateRaw.toDate();
    } else {
      dateObj = new Date(dateRaw);
    }
    if (isNaN(dateObj.getTime())) return null;

    let hours = 0, minutes = 0;
    if (timeRaw) {
      if (typeof timeRaw === 'string' && timeRaw.includes(':')) {
        const parts = timeRaw.split(':');
        hours = parseInt(parts[0], 10) || 0;
        minutes = parseInt(parts[1], 10) || 0;
      } else if (timeRaw.toDate) {
        const t = timeRaw.toDate();
        hours = t.getHours();
        minutes = t.getMinutes();
      }
    }

    return new Date(dateObj.getFullYear(), dateObj.getMonth(), dateObj.getDate(), hours, minutes);
  }

  function dateKey(d) { return d.toISOString().slice(0, 10); }

  function renderGrid() {
    const selectedDate = datePicker.value;
    const nurseRowsEl = document.getElementById('nurse-rows');
    const emptyState = document.getElementById('empty-state');
    nurseRowsEl.innerHTML = '';

    const dayBookings = allBookings.filter(b => {
      const dt = parseSlotDateTime(b.data);
      if (!dt) return false;
      return dateKey(dt) === selectedDate;
    });

    document.getElementById('order-count').textContent = dayBookings.length + (dayBookings.length === 1 ? ' order' : ' orders');
    document.getElementById('subtitle').textContent =
      new Date(selectedDate + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

    if (dayBookings.length === 0) {
      emptyState.classList.remove('hidden');
      return;
    }
    emptyState.classList.add('hidden');

    const byNurse = {};
    dayBookings.forEach(b => {
      const nurse = b.data["Nurse Name"] || "Unassigned";
      if (!byNurse[nurse]) byNurse[nurse] = [];
      byNurse[nurse].push(b);
    });

    const nurseNames = Object.keys(byNurse).sort();
    const gridTotalWidth = (GRID_END_HOUR - GRID_START_HOUR) * PIXELS_PER_HOUR;

    nurseNames.forEach(nurseName => {
      const row = document.createElement('div');
      row.className = 'flex nurse-row';

      const label = document.createElement('div');
      label.className = 'w-[180px] shrink-0 px-3 py-2 flex items-center gap-2 border-r border-[#f0ebe0] bg-white sticky left-0';
      label.innerHTML = '<span class="h-3 w-3 rounded-full shrink-0" style="background:' + colorFor(nurseName) + '"></span>' +
        '<span class="text-sm font-medium text-[#1A2238] truncate">' + nurseName + '</span>';
      row.appendChild(label);

      const timeline = document.createElement('div');
      timeline.className = 'relative flex-1';
      timeline.style.width = gridTotalWidth + 'px';

      for (let h = GRID_START_HOUR; h < GRID_END_HOUR; h++) {
        const line = document.createElement('div');
        line.style.position = 'absolute';
        line.style.left = ((h - GRID_START_HOUR) * PIXELS_PER_HOUR) + 'px';
        line.style.top = '0';
        line.style.bottom = '0';
        line.style.borderRight = '1px solid #f5f1e8';
        timeline.appendChild(line);
      }

      byNurse[nurseName].forEach(b => {
        const dt = parseSlotDateTime(b.data);
        if (!dt) return;
        const hourFloat = dt.getHours() + dt.getMinutes() / 60;
        if (hourFloat < GRID_START_HOUR || hourFloat >= GRID_END_HOUR) return;

        const leftPx = (hourFloat - GRID_START_HOUR) * PIXELS_PER_HOUR;
        const widthPx = Math.max((DEFAULT_DURATION_MIN / 60) * PIXELS_PER_HOUR, 60);

        const status = b.data.status || "Pending";
        const accent = statusAccent[status];
        const baseColor = colorFor(nurseName);

        const block = document.createElement('div');
        block.className = 'booking-block';
        block.style.left = leftPx + 'px';
        block.style.width = Math.min(widthPx, gridTotalWidth - leftPx) + 'px';
        block.style.background = hexToRgba(baseColor, 0.13);
        block.style.borderLeft = '4px solid ' + (accent || baseColor);

        const customer = b.data["User_Name"] || b.data.customerName || "Unknown";
        const timeLabel = dt.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

        block.innerHTML = '<div class="text-[11px] font-semibold text-[#1A2238] truncate">' + customer + '</div>' +
          '<div class="text-[10px] text-[#6b6557] truncate">' + timeLabel + ' &middot; ' + status + '</div>';
        block.addEventListener('click', () => openModal(b));
        timeline.appendChild(block);
      });

      row.appendChild(timeline);
      nurseRowsEl.appendChild(row);
    });
  }

  function hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
  }

  const modal = document.getElementById('status-modal');

  function openModal(booking) {
    activeModalDocId = booking.id;
    const d = booking.data;
    document.getElementById('modal-nurse-name').textContent = d["Nurse Name"] || "Unassigned";
    document.getElementById('modal-customer-name').textContent = d["User_Name"] || d.customerName || "Unknown customer";
    document.getElementById('modal-order-id').textContent = booking.id;
    const dt = parseSlotDateTime(d);
    document.getElementById('modal-time').textContent = dt
      ? dt.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })
      : '—';
    document.getElementById('modal-package').textContent = d["Package Name"] || d["Package Type 2"] || '—';
    modal.classList.remove('hidden');
  }
  function closeModal() {
    modal.classList.add('hidden');
    activeModalDocId = null;
  }
  document.getElementById('modal-close').addEventListener('click', closeModal);
  modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

  document.querySelectorAll('.modal-status-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!activeModalDocId) return;
      const newStatus = btn.getAttribute('data-status');
      try {
        await updateDoc(doc(db, "bookings", activeModalDocId), { status: newStatus });
        closeModal();
      } catch (err) {
        console.error("Failed to update status:", err);
        alert("Could not update status. Check console for details.");
      }
    });
  });

  document.getElementById('prev-day').addEventListener('click', () => shiftDate(-1));
  document.getElementById('next-day').addEventListener('click', () => shiftDate(1));
  document.getElementById('today-btn').addEventListener('click', () => {
    datePicker.value = todayStr();
    renderGrid();
  });
  datePicker.addEventListener('change', renderGrid);

  function shiftDate(delta) {
    const d = new Date(datePicker.value + 'T00:00:00');
    d.setDate(d.getDate() + delta);
    datePicker.value = d.toISOString().slice(0, 10);
    renderGrid();
  }

  const bookingsCollection = collection(db, "bookings");

  onSnapshot(bookingsCollection, (snapshot) => {
    const seen = new Set();
    const deduped = [];

    snapshot.forEach(docRecord => {
      const data = docRecord.data();
      const status = String(data["Order Status"] || data.status || '').trim().toUpperCase();
      const hasAmendedStatus = !!data.status;
      if (status !== "NURSE ASSIGNED" && !hasAmendedStatus) return;

      const orderKey = docRecord.id;
      if (seen.has(orderKey)) return;
      seen.add(orderKey);

      deduped.push({ id: docRecord.id, data });
    });

    allBookings = deduped;
    renderGrid();
  }, (error) => {
    console.error("Firestore listener error:", error);
    document.getElementById('subtitle').textContent = 'Connection error — check console';
  });

</script>
</body>
</html>
